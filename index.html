<!DOCTYPE html>
<html lang="vi">

<head>
    
<meta charset="UTF-8">
    
<meta property="og:title" content="MB Quiz Vietnamese">
<meta property="og:description" content="Quiz game tiếng Việt">
<meta property="og:type" content="website">
    
<title>MB Quiz Vietnamese</title>
    
<link rel="stylesheet" href="style.css">
    
<meta
    name="description"
    content="
    MB Quiz Vietnamese
    là game quiz tiếng Việt
    miễn phí trên web.
">
    
</head>

<body>

<div class="container">

    <!-- SCORE -->
    <div class="score" id="score">
        Score : 0
    </div>

    <!-- LOGO -->

        MB QUIZ VIETNAMESE
    </div>

    <!-- QUESTION -->
    <div class="question" id="question">
        Loading question...
    </div>

    <!-- ANSWERS -->
    <div class="answers">

        <div class="answer" id="A" data-answer="A">
            Loading A...
        </div>

        <div class="answer" id="B" data-answer="B">
            Loading B...
        </div>

        <div class="answer" id="C" data-answer="C">
            Loading C...
        </div>

        <div class="answer" id="D" data-answer="D">
            Loading D...
        </div>

    </div>

</div>

<!-- JS -->
<script type="module" src="js/control.js"></script>

</body>
</html>
