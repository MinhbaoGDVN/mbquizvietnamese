<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MB Quiz Vietnamese</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- SCORE -->
    <div class="score" id="score">
        Score : 0
    </div>

    <!-- LOGO -->
    <div class="logo">
        MB QUIZ ViETNAMESE
    </div>

    <!-- QUESTION -->
    <div class="question" id="question">
        Loading question...
    </div>

    <!-- ANSWERS -->
    <div class="answers">

        <div class="answer" id="A" data-answer="A">
            Loading A...
        </div>

        <div class="answer" id="B" data-answer="B">
            Loading B...
        </div>

        <div class="answer" id="C" data-answer="C">
            Loading C...
        </div>

        <div class="answer" id="D" data-answer="D">
            Loading D...
        </div>

    </div>

</div>

<!-- JS -->
<script src="js/readdata.js"></script>
<script src="js/randomquestion.js"></script>
<script src="js/handle.js"></script>
<script src="js/animation.js"></script>
<script src="js/control.js"></script>

</body>
</html>
